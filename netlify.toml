[build]
  command = "npx prisma generate && npx prisma migrate deploy && npm run build"
  publish = ".next"

# Next.js inlines server env vars into SSR bundles during build. DATABASE_URL is
# never sent to the browser; tell Netlify not to fail the deploy for it.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "DATABASE_URL,SESSION_SECRET"
