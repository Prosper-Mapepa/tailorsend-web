# Railway — API (Express auth backend)
# Create a service with Root Directory = "backend".
# Attach the Postgres plugin so DATABASE_URL is linked.

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run generate"

[deploy]
# Regenerate Prisma client at boot — gitignored output may be omitted from the image.
startCommand = "npm run generate && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
# PORT is injected by Railway. Set NODE_ENV=production in the service variables.
