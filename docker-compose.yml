services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Letmein@99x!
      POSTGRES_DB: tailorsend
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
