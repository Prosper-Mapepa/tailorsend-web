# Nixpacks phases for Railway web service.
# Keep install separate from build so Docker's node_modules cache mount
# is not deleted by `npm ci` (causes EBUSY on /.cache).

[phases.setup]
# System Chromium via Nix — avoids `playwright install --with-deps` (apt timeout on Railway).
nixPkgs = ["nodejs_20", "npm-10_x", "chromium", "noto-fonts"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build",
]

[variables]
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[start]
cmd = "npm run start:railway"
