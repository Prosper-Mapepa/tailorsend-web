# Railway — Web (Next.js frontend)
# Create a service with Root Directory = "/" (repo root).
# Build phases live in nixpacks.toml (avoids EBUSY when npm ci fights the
# Docker node_modules cache mount used by Nixpacks).

[build]
builder = "nixpacks"

[deploy]
# Migrate then bind Next on 0.0.0.0:$PORT (Railway injects PORT — do not override it).
startCommand = "npm run start:railway"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
