# Railway — Web (Next.js frontend)
# Create a service with Root Directory = "/" (repo root).
# Attach the same Postgres plugin as the API service.

[build]
builder = "nixpacks"
# Chromium install is best-effort: screenshots/PDF need it, but a browser
# download hiccup must never fail the core web build (tailoring/parse).
buildCommand = "npm ci && npx prisma generate && npm run build && (npx playwright install --with-deps chromium || npx playwright install chromium || true)"

[deploy]
# Migrate before serving so schema stays current on each deploy.
startCommand = "npx prisma migrate deploy && npm run start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
# Next.js `next start` binds to $PORT, which Railway injects automatically.
